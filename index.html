<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
>

<title>Kathy AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <aside id="sidebar">

        <div id="logo">
            Kathy
        </div>

        <button id="newChat">
            + Nova conversa
        </button>

        <div id="chatList"></div>

        <div id="userCard">

            <span id="username">
                Usuário
            </span>

            <button id="editUser">
                ⚙
            </button>

        </div>

    </aside>

    <main id="main">

        <header id="chatHeader">
            Chat
        </header>

        <div id="chat"></div>

        <div id="input-area">

            <label class="circle-btn">

                +

                <input
                    type="file"
                    id="imageInput"
                    hidden
                >

            </label>

            <input
                type="text"
                id="message"
                placeholder="Mensagem para Kathy..."
            >

            <button id="send">
                ➜
            </button>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
