<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kathy AI</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="chat-container">

    <div class="topbar">
        <h2>Kathy AI</h2>
    </div>

    <div id="chat"></div>

    <div class="input-area">

        <input
            type="file"
            id="imagem"
            accept="image/*"
            hidden
        >

        <button onclick="selecionarImagem()">
            📷
        </button>

        <button
            id="btnInternet"
            onclick="toggleInternet()"
        >
            🌐
        </button>

        <input
            id="mensagem"
            placeholder="Digite uma mensagem..."
        >

        <button onclick="enviarMensagem()">
            ➜
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
