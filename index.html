<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kathy AI</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <div id="chat"></div>

    <div id="typing" hidden>
        Kathy está digitando...
    </div>

    <div id="input-area">

        <label class="circle-btn">
            +
            <input type="file" id="imageInput" hidden>
        </label>

        <input
            type="text"
            id="message"
            placeholder="Mensagem..."
        >

        <button id="send">
            ➜
        </button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
